        function removeReminder(id) {
            haptic(30);
            app.calendarReminders = app.calendarReminders.filter(r => r.id !== id);
            save();
            renderCalendar();
            renderReminders();
        }

        function completeReminder(id) {
            haptic([30, 50, 30]);
            app.calendarReminders = app.calendarReminders.filter(r => r.id !== id);
            save();
            renderCalendar();
