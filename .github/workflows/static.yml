                        </div>
                        <button class="btn" onclick="removeProtocolFromMatrix('${c.id}'); closeModal(); openDecommissionMenu();" 
                            style="width:auto; margin:0; padding:8px 12px; font-size:9px; background:rgba(255,62,62,0.1); color:var(--accent); border:1px solid var(--accent);">REMOVE</button>
                    </div>
                `;
            });
            listHtml += '</div>';
            openModal(t.mission, listHtml, null);
