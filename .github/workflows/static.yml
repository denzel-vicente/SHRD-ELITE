                    <button class="btn btn-ghost" style="width:100%; margin-top:15px; border:1px dashed var(--border);" onclick="openExerciseCreator('${id}')">${t['btn-add-exercise']}</button>
                </div>
            `;
            openModal("ARCHITECT", content, () => { });
        }

        function openExerciseCreator(folderId) {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const content = `
                <div style="text-align:left;">
                    <input id="ex-name" placeholder="${t['ph-ex-name'] || 'EXERCISE NAME'}" style="width:100%; margin-bottom:10px;">
                    <input id="ex-machine" placeholder="${t['ph-ex-machine'] || 'MACHINE/EQUIP.'}" style="width:100%; margin-bottom:10px;">
                    <div style="display:flex; gap:10px;">
                        <input id="ex-sets" type="number" placeholder="${t['ph-ex-sets'] || 'SETS'}" style="flex:1;">
                        <input id="ex-rest" type="number" placeholder="${t['ph-ex-rest'] || 'REST (SEC)'}" style="flex:1;">
                    </div>
                </div>
            `;
            openModal(t['btn-add-exercise'] || "ADD EXERCISE", content, () => {
                const name = document.getElementById('ex-name').value;
                const machine = document.getElementById('ex-machine').value;
                const sets = document.getElementById('ex-sets').value;
                const rest = document.getElementById('ex-rest').value;
                if (!name || !sets || !rest) return false;

                const ex = { id: 'ex_' + Date.now(), name, machine, sets, rest: parseInt(rest) };
                const f = app.training.folders.find(x => x.id === folderId);
                if (f) {
                    f.exercises.push(ex);
                    save();
                }
                setTimeout(() => openFolderEditor(folderId), 300);
            });
        }

        function removeExerciseFromFolder(fId, idx) {
            const f = app.training.folders.find(x => x.id === fId);
            f.exercises.splice(idx, 1);
            save();
            openFolderEditor(fId);
        }

        function deleteFolder(id) {
            openModal("DELETE FOLDER", "<p style='font-size:12px;'>Irrevocably delete this mission folder?</p>", () => {
                app.training.folders = app.training.folders.filter(x => x.id !== id);
                save();
                renderTrainingLab();
            });
        }

        function cancelWorkout() {
            openModal("ABORT MISSION", "<p style='font-size:12px;'>Are you sure you want to abort? Progress will be lost.</p>", () => {
                haptic(50);
                app.training.activeWorkout = null;
                app.active = false;
                save();
                document.getElementById('training-dashboard').style.display = 'block';
                document.getElementById('active-workout-view').style.display = 'none';
                renderTrainingLab();
            });
        }

        function startFolderWorkout(id) {
            const f = app.training.folders.find(x => x.id === id);
            if (!f || f.exercises.length === 0) return;
            haptic(100);

            app.training.activeWorkout = {
                folderId: id,
                name: f.name,
                exercises: f.exercises.map(ex => ({
                    ...ex,
                    setsLogged: []
                })),
                startTime: Date.now()
            };
            app.active = true;
            renderTrainingLab(); // Refresh dashboard
            renderActiveWorkout();
            document.getElementById('training-dashboard').style.display = 'none';
            document.getElementById('active-workout-view').style.display = 'block';
        }

        function finishWorkout() {
            const w = app.training.activeWorkout;
            if (!w) return;
            haptic(200);

            let totalSets = 0;
            w.exercises.forEach(ex => totalSets += ex.setsLogged.length);

            const session = {
                id: 'sess_' + Date.now(),
                name: w.name,
                date: new Date().toLocaleDateString(),
                sets: totalSets,
                exCount: w.exercises.length,
                folderId: w.folderId
            };

            app.training.history.unshift(session);
            app.training.activeWorkout = null;
            app.active = false;
            save();

            document.getElementById('training-dashboard').style.display = 'block';
            document.getElementById('active-workout-view').style.display = 'none';
            renderTrainingLab();
        }

        function removeGymPass() {
            app.user.gymPass = null;
            save();
            document.getElementById('gym-pass-img').style.display = 'none';
            document.getElementById('gym-pass-empty').style.display = 'block';
            document.getElementById('gym-pass-actions').style.display = 'none';
        }

        function toggleGymPass() {
            const m = document.getElementById('gym-pass-modal');
            const isOpen = m.style.display === 'flex';
            m.style.display = isOpen ? 'none' : 'flex';

            const img = document.getElementById('gym-pass-img');
            const empty = document.getElementById('gym-pass-empty');
            const actions = document.getElementById('gym-pass-actions');

            if (!isOpen && app.user.gymPass) {
                img.src = app.user.gymPass;
                img.style.display = 'block';
                empty.style.display = 'none';
                actions.style.display = 'block';
            } else if (!isOpen) {
                img.style.display = 'none';
                empty.style.display = 'block';
                actions.style.display = 'none';
            }
        }

        function captureGymPass() { document.getElementById('gym-pass-input').click(); }
        function handleGymPass(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ex) => {
                app.user.gymPass = ex.target.result;
                save();
                toggleGymPass();
            };
            reader.readAsDataURL(file);
        }

        function renderOnboardingChecklist() {
            const list = document.getElementById('setup-pillars-list');
            list.innerHTML = '';
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            app.pillars.forEach(p => {
                const item = document.createElement('div');
                item.className = `card ${p.active ? '' : 'disabled'}`;
                item.style.marginBottom = '8px';
                const label = p[`label_${app.lang}`] || p.label;

                if (app.persona === 'custom') {
                    // Optimized for Personalized: Dynamic Removal Instead of Toggle
                    item.innerHTML = `
                        <div class="card-info"><h4>${label}</h4><p>${p.period.toUpperCase()}</p></div>
                        <div style="color:var(--accent); font-family:'Outfit'; font-weight:900; font-size:10px; cursor:pointer; padding:10px;" onclick="removeProtocolFromMatrix('${p.id}')">REMOVE</div>
                    `;
                } else {
                    item.innerHTML = `
                        <div class="card-info"><h4>${label}</h4><p>${p.period.toUpperCase()}</p></div>
                        <div class="checkbox ${p.active ? 'checked' : ''}" onclick="togglePillarActive('${p.id}')"></div>
                    `;
                }
                list.appendChild(item);
            });
        }

        function removeProtocolFromMatrix(id) {
            haptic(10);
            app.pillars = app.pillars.filter(x => x.id !== id);
            save();
            renderOnboardingChecklist();
            render();
        }

        function togglePillarActive(id) {
            const p = app.pillars.find(x => x.id === id);
            if (p) p.active = !p.active;
            renderOnboardingChecklist();
        }

        function finalizeOnboarding() {
            const w = document.getElementById('setup-w').value;
            const h = document.getElementById('setup-h').value;
            const a = document.getElementById('setup-age-setup').value;
            if (!w || !h || !a) { haptic([50, 50]); return; }
            app.user.mass = parseFloat(w);
            app.user.height = parseFloat(h);
            app.user.age = parseInt(a);
            app.active = true;
            save();
            unlock();
        }

        function togglePillar(id) { const p = app.pillars.find(x => x.id === id); if (p.isWater && !p.done) return; haptic(p.done ? 10 : 40); p.done = !p.done; save(); }
        function addWater(v) { haptic(); app.water.logged += v; if (app.water.logged >= app.water.target) { const wp = app.pillars.find(p => p.isWater); if (wp) wp.done = true; } save(); }
        function resetWater() { const t = TRANSLATIONS[app.lang]; openModal(t.vessel, t.water_reset + "?", () => { app.water.logged = 0; const wp = app.pillars.find(p => p.isWater); if (wp) wp.done = false; save(); }); }

        function navTo(v) {
            haptic(10);
            window.curV = v;
            document.querySelectorAll('.v-content').forEach(c => c.style.display = 'none');
            const target = document.getElementById(`v-${v}`);
            if (target) target.style.display = 'flex';
            
            const viewCont = document.querySelector('.view');
            if (viewCont) {
                if (v === 'project-canvas') {
                    viewCont.classList.add('no-padding');
                    viewCont.style.overflow = 'hidden';
                } else {
                    viewCont.classList.remove('no-padding');
                    viewCont.style.overflow = 'auto';
                }
            }

            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                if (i.getAttribute('onclick') && i.getAttribute('onclick').includes(v)) {
                    i.classList.add('active');
                }
            });

            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const vt = document.getElementById('view-title');
            if (vt) vt.innerText = t[`view_${v}`] || v.toUpperCase();
            
            if (v === 'training') renderTrainingLab();
            if (v === 'projects') renderProjects();
            if (v === 'project-canvas') renderProjectCanvas();
            render();
        }
        function toggleDrawer() { haptic(5); drawerOpen = !drawerOpen; document.getElementById('done-tasks').style.display = drawerOpen ? 'block' : 'none'; }




        function renderActiveWorkout() {
            const list = document.getElementById('active-exercise-list');
            if (!list || !app.training.activeWorkout) return;
            list.innerHTML = `<h2 style="font-size:16px; margin-bottom:20px;">${app.training.activeWorkout.name.toUpperCase()}</h2>`;

            app.training.activeWorkout.exercises.forEach((ex, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.flexDirection = 'column';
                card.style.alignItems = 'stretch';
