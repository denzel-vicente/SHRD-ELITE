        function toggleDayChip(d) {
            const chip = document.getElementById(`chip-${d}`);
            if (window.tempDays.includes(d)) {
                window.tempDays = window.tempDays.filter(x => x !== d);
                chip.classList.remove('selected');
            } else {
                window.tempDays.push(d);
                chip.classList.add('selected');
            }
            haptic(10);
        }

        function openFolderEditor(id) {
            const f = app.training.folders.find(x => x.id === id);
            if (!f) return;
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;

            const exercisesHTML = f.exercises.map((ex, idx) => `
                <div class="card" style="padding:12px; margin-bottom:8px; align-items:center; justify-content:space-between;">
                    <div style="text-align:left;">
                        <div style="font-size:11px; font-weight:900;">${ex.name.toUpperCase()}</div>
                        <div style="font-size:8px; opacity:0.5;">${ex.machine || 'BODYWEIGHT'} | ${ex.sets} SETS | ${ex.rest}s REST</div>
                    </div>
                    <div style="color:var(--accent); font-size:14px; cursor:pointer;" onclick="removeExerciseFromFolder('${id}', ${idx})">×</div>
                </div>
            `).join('');

            const content = `
                <div style="text-align:left; max-height:60vh; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h4 style="font-size:12px; margin:0;">${f.name.toUpperCase()}</h4>
