        function logSet(exIdx, restTime) {
            const w = document.getElementById(`weight-${exIdx}`).value;
            const r = document.getElementById(`reps-${exIdx}`).value;
            if (!w || !r) return;

            app.training.activeWorkout.exercises[exIdx].setsLogged.push({ w, r });
            haptic(50);
            renderActiveWorkout();
            startRestTimer(restTime || 60);
        }

        function cancelWorkout() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            openModal(t.warning, "ABORT THIS SESSION?", () => {
                app.training.activeWorkout = null;
                save();
                renderTrainingLab();
            });
        }

        function finishWorkout() {
            haptic(100);
            const workout = app.training.activeWorkout;
            workout.endTime = Date.now();
            app.training.history.push(workout);
            app.training.activeWorkout = null;
            save();
            renderTrainingLab();
            openModal("MISSION COMPLETE", "Workload committed to history vault.", () => { });
        }

        function startRestTimer(sec) {
            haptic(30);
            startTimer(sec);
        }

        function calculateBMI() {
            if (!app.user.mass || !app.user.height) return "--";
            const h = app.user.height / 100;
            if (!h) return "--";
            return (app.user.mass / (h * h)).toFixed(1);
        }

        async function fetchWeather() {
            const t = 31;
            const base = app.user.mass * 0.035;
            app.water.raw = base;
            if (t > 30) app.water.target = (base * 1.15).toFixed(2);
            else app.water.target = base.toFixed(2);
            save();
        }

        function startOnboarding() { obStep = 0; updateOBStep(); show('screen-onboarding'); }
        function setGender(g) { app.user.gender = g; haptic(); obNext(); }

        function obNext() {
            haptic();
            if (obStep === 0) obStep = 2; // Bypass old Persona step
            else if (obStep === 2) {
                const name = document.getElementById('setup-name').value;
                const mass = document.getElementById('setup-w').value;
                const height = document.getElementById('setup-h').value;
                const age = document.getElementById('setup-age-setup').value;
                if (!mass || !height || !age) { haptic([50, 50]); return; }
                app.user.name = name;
                app.user.mass = parseFloat(mass);
                app.user.height = parseFloat(height);
                app.user.age = parseInt(age);
                obStep = 'water';
                calculateRecommendedWater();
            }
            else if (obStep === 'water') obStep = 4;
            else obStep++;
            updateOBStep();
        }

        function obBack() {
            haptic();
            if (obStep === 0) { show('screen-gateway'); return; }
            if (obStep === 1) obStep = 0;
            else if (obStep === 2) obStep = 0;
            else if (obStep === 'water') obStep = 2;
            else if (obStep === 4) obStep = 'water';
            else obStep--;
            updateOBStep();
        }

        function updateOBStep() {
            document.querySelectorAll('.step').forEach(x => x.style.display = 'none');
            const el = document.getElementById(`ob-${obStep}`);
            if (el) el.style.display = 'block';
            if (obStep === 4) renderOnboardingChecklist();
        }

        function calculateRecommendedWater() {
            const multiplier = app.user.gender === 'female' ? 0.030 : 0.035;
            const rec = (app.user.mass * multiplier).toFixed(1);
            document.getElementById('rec-water-val').innerText = rec + "L";
            window.recommendedWater = parseFloat(rec);
            selectWaterGoal('rec');
        }

        function selectWaterGoal(type) {
            haptic(10);
            const btnRec = document.getElementById('btn-water-rec');
            const customBox = document.getElementById('water-custom-box');

            if (type === 'rec') {
                btnRec.classList.add('active');
                customBox.style.borderColor = 'var(--border)';
                app.water.target = window.recommendedWater;
            } else {
                btnRec.classList.remove('active');
                customBox.style.borderColor = 'var(--accent)';
            }
        }

        function focusCustomWater() {
            document.getElementById('setup-water-custom').focus();
            selectWaterGoal('custom');
        }

        function finalizeWaterGoal() {
            const customVal = document.getElementById('setup-water-custom').value;
            if (customVal) app.water.target = parseFloat(customVal);
            obNext();
        }

        function setPersona(p) {
            app.persona = p;
            if (p === 'ghost') {
                app.pillars = PILLARS_DEFS.map(pill => ({ ...pill, done: false, active: true }));
            } else if (p === 'standard') {
                app.pillars = PILLARS_DEFS.map((pill, idx) => ({ ...pill, done: false, active: (idx < 12) }));
            } else {
                app.pillars = [];
            }
            // If we are in onboarding, move to next step. If not (in settings), just save.
            if (document.getElementById('screen-onboarding').style.display !== 'none') {
                obStep = 4;
                updateOBStep();
            } else {
                save(); render();
            }
        }

        function setPersonaDirect(p) {
            haptic(20);
            app.persona = p;

            // Visual feedback for presets
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            const map = { standard: 'p-btn-standard', ghost: 'p-btn-ghost', custom: 'p-btn-custom' };
            if (map[p]) document.getElementById(map[p]).classList.add('active');

            if (p === 'ghost') {
                app.pillars = PILLARS_DEFS.map(pill => ({ ...pill, done: false, active: true }));
            } else if (p === 'standard') {
                app.pillars = PILLARS_DEFS.map((pill, idx) => ({ ...pill, done: false, active: (idx < 12) }));
            } else {
                app.pillars = [];
            }
            renderOnboardingChecklist();
        }

        function initApp() {
            const saved = localStorage.getItem('SHRED_ELITE_PRO_VAULT');
            if (saved) {
                const data = JSON.parse(saved);
                // Deep merge strategy to prevent structural failures
                app = { ...app, ...data };
                if (data.user) app.user = { ...app.user, ...data.user };
                if (data.water) app.water = { ...app.water, ...data.water };

                // V8.1 Structural Hardening: Ensure training state exists
                if (!app.training) app.training = { history: [], activeWorkout: null, weeklyPlan: { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] } };
                if (data.training) {
                    app.training = { ...app.training, ...data.training };
                    if (!app.training.weeklyPlan) app.training.weeklyPlan = { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
                }

                // Elite V10.0 Persistence Hardening
                if (!app.training.folders) app.training.folders = [];
                if (!app.training.history) app.training.history = [];
                if (!app.user) app.user = { name: "Vessel", mass: 75, height: 180, age: 25, gender: 'male' };
                if (!app.calendarReminders) app.calendarReminders = [];
                if (!app.reminders) app.reminders = {};
                if (!app.reminderFilter) app.reminderFilter = 'soon';

                // Cleanup legacy
                if (app.training.weeklyPlan) delete app.training.weeklyPlan;

                unlock();
                if (!window.curV) navTo('warroom');
            } else {
                show('screen-gateway');
            }
            fetchWeather();
        }

        function openTacticalCommandMenu() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const content = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <button class="btn" onclick="closeModal(); openAddProtocolInternal()" style="margin:0; background:var(--surface); color:var(--text); border:1px solid var(--border);">${t['menu-add']}</button>
                    <button class="btn" onclick="closeModal(); openDecommissionMenu()" style="margin:0; background:var(--surface); color:var(--accent); border:1px solid var(--border);">${t['menu-remove']}</button>
                </div>
            `;
            openModal(t.mission, content, null);
        }

        function openDecommissionMenu() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const activePillars = app.pillars.filter(p => p.active);
            if (activePillars.length === 0) {
                openModal(t.mission, '<p style="text-align:center; opacity:0.5;">No active protocols found.</p>', null);
