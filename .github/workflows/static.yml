        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const hdr = document.getElementById('cal-month-year');
            if (!grid || !hdr) return;

            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            hdr.innerText = `${t.months[month]} ${year}`;
            grid.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Days of the week headers
            const days = app.lang === 'pt' ? ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'] : ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            days.forEach(d => {
                const h = document.createElement('div');
                h.className = 'cal-day';
                h.style.fontWeight = '900';
                h.style.color = 'var(--text)';
                h.style.minHeight = '30px';
                h.style.alignItems = 'center';
                h.style.justifyContent = 'center';
                h.style.fontSize = '9px';
                h.style.letterSpacing = '1px';
                h.innerText = d;
                grid.appendChild(h);
            });

            // Empty slots for first week
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // Days of the month
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = new Date(year, month, d).toLocaleDateString();
                const hist = app.training && app.training.history ? app.training.history.find(h => h.date === dateStr) : null;
                const note = app.reminders ? app.reminders[dateStr] : null;
                const dayEl = document.createElement('div');
                dayEl.className = 'cal-day';
                dayEl.style.cursor = 'pointer';
                dayEl.innerHTML = `<span>${d}</span>`;
                dayEl.onclick = () => openDayLog(dateStr);

                if (d === now.getDate()) dayEl.classList.add('today');
                if (note) {
                    dayEl.style.border = '1px dashed var(--accent)';
                }

                // V9.1: Strategic Reminder Marker (Normalized Comparison)
                const hasReminder = (app.calendarReminders || []).find(r => {
                    const rDate = new Date(r.date + 'T00:00:00').toLocaleDateString();
                    return rDate === dateStr;
                });
                if (hasReminder) {
                    dayEl.style.border = '1px solid var(--accent)';
                }

                if (hist && hist.total > 0) {
                    dayEl.classList.add('has-data');
                    if (hist.total >= 100) dayEl.classList.add('perfect');
                }
                grid.appendChild(dayEl);
            }
        }

        function openDayLog(date) {
            if (!app.reminders) app.reminders = {};
            const current = app.reminders[date] || "";
            const content = `
                <div style="text-align:left;">
                    <p style="font-size:10px; opacity:0.5; margin-bottom:10px;">ACTIVITY LOG: ${date}</p>
                    <textarea id="day-note-input" style="width:100%; height:100px; background:var(--bg); color:white; border:1px solid var(--border); border-radius:15px; padding:15px; font-family:'Inter'; font-size:13px;">${current}</textarea>
                </div>
            `;
            openModal("DAY TRACKER", content, () => {
                const note = document.getElementById('day-note-input').value;
                if (!app.reminders) app.reminders = {};
                if (note.trim()) app.reminders[date] = note;
                else delete app.reminders[date];
                save();
            });
        }

        function setReminderFilter(f) {
            haptic(10);
            app.reminderFilter = f;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            const chip = document.getElementById(`f-${f}`);
            if (chip) chip.classList.add('active');
            renderReminders();
        }

        function renderReminders() {
            const list = document.getElementById('strategic-reminder-list');
            if (!list) return;
            list.innerHTML = '';

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            let filtered = (app.calendarReminders || []);

            if (app.reminderFilter === 'soon') {
                const limit = new Date(now);
                limit.setDate(limit.getDate() + 7);
                filtered = filtered.filter(r => {
                    const d = new Date(r.date + 'T00:00:00'); // Normalized to local midnight
                    return d >= now && d <= limit;
                });
            } else if (app.reminderFilter === 'month') {
                const m = now.getMonth();
                const y = now.getFullYear();
                filtered = filtered.filter(r => {
                    const d = new Date(r.date + 'T00:00:00');
                    return d.getMonth() === m && d.getFullYear() === y;
                });
            }

            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filtered.length === 0) {
                list.innerHTML = `<p style="text-align:center; opacity:0.3; font-size:9px; padding:10px;">NO STRATEGIC INTEL FOUND</p>`;
                return;
            }

            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '15px';
                card.style.justifyContent = 'space-between';
                card.style.alignItems = 'flex-start';

                const d = new Date(r.date);
                const isToday = d.toDateString() === new Date().toDateString();

                card.innerHTML = `
                    <div style="flex:1;">
                        <h4 style="font-size:12px; color:${isToday ? 'var(--accent)' : 'var(--text)'};">${r.name.toUpperCase()}</h4>
                         <div style="display:flex; gap:8px; margin-top:4px;">
                            <span style="font-size:8px; opacity:0.6; font-weight:900;">${r.date}</span>
                            ${r.hour ? `<span style="font-size:8px; opacity:0.6; color:var(--accent);">@ ${r.hour}</span>` : ''}
                        </div>
                        ${r.description ? `<p style="font-size:10px; opacity:0.5; margin-top:6px; line-height:1.4;">${r.description}</p>` : ''}
                    </div>
                    <div onclick="completeReminder('${r.id}')" style="color:var(--success); font-weight:900; font-size:10px; cursor:pointer; padding-left:10px; display:flex; align-items:center;">COMPLETE</div>
                `;
                list.appendChild(card);
            });
        }

        function openReminderCreator() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            haptic(20);
            const content = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <input id="rem-name" type="text" placeholder="${t['ph-reminder-name'] || 'MISSION NAME'}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                    <input id="rem-date" type="date" value="${new Date().toISOString().split('T')[0]}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                    <input id="rem-hour" type="time" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                    <textarea id="rem-desc" placeholder="${t['ph-reminder-desc'] || 'OPERATIONAL DETAILS'}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px; min-height:80px;"></textarea>
                </div>
            `;
            openModal("STRATEGIC INTEL", content, () => {
