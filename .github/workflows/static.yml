        // --- MODAL ENGINE ---
        function openModal(title, body, onConfirm) {
            haptic(40);
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            const btn = document.getElementById('modal-confirm-btn');
            btn.style.display = 'block';
            btn.onclick = () => {
                if (onConfirm) {
                    const res = onConfirm();
                    if (res !== false) closeModal();
                } else {
                    closeModal();
                }
            };
            document.getElementById('modal-overlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }


        // --- FOCUS ENGINE (POMODORO) ---
        let pomoInterval = null;
        let pomoTime = 1500; // default 25 min
        let pomoActive = false;

        function togglePomo() {
            if (pomoActive) {
                clearInterval(pomoInterval);
                pomoActive = false;
                document.querySelector('.pomo-btn').innerText = '▶️';
            } else {
                pomoActive = true;
                document.querySelector('.pomo-btn').innerText = '⏸️';
                pomoInterval = setInterval(() => {
                    pomoTime--;
                    if (pomoTime <= 0) {
                        clearInterval(pomoInterval);
                        pomoActive = false;
                        haptic(100);
                        openModal("FOCUS COMPLETE", "Session finalized. Re-calibrate and proceed.");
                    }
                    updatePomoDisplay();
                }, 1000);
            }
        }

        function resetPomo() {
            clearInterval(pomoInterval);
            pomoActive = false;
            pomoTime = (app.settings.pomoWork || 25) * 60;
            updatePomoDisplay();
            document.querySelector('.pomo-btn').innerText = '▶️';
        }

        function updatePomoDisplay() {
            const m = Math.floor(pomoTime / 60);
            const s = pomoTime % 60;
            const display = document.getElementById('pomo-display');
            if (display) display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function configPomo() {
            const content = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <small style="font-size:10px; font-weight:900; opacity:0.5;">FOCUS DURATION (MINUTES)</small>
                    <input id="pomo-config-val" type="number" value="${app.settings.pomoWork || 25}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                </div>
            `;
            openModal("CONFIG POMODORO", content, () => {
                const val = document.getElementById('pomo-config-val').value;
                if (val) {
                    app.settings.pomoWork = parseInt(val);
                    save();
                    resetPomo();
                }
            });
        }

        function updateSettingsValue(key, val) {
            if (!app.settings) app.settings = {};
            app.settings[key] = parseFloat(val);
            if (key === 'waterGoal') {
                app.water.target = app.settings.waterGoal;
            }
            save();
            render();
        }

        // --- CORE UI ---
        function setLang(l) {
            app.lang = l;
            haptic(30);
            save();
            render();
        }

        function render() {
            if (!app.lang) app.lang = 'en';
            if (!app.settings) app.settings = { waterGoal: 2, pomoWork: 25 };
            
            const wGoal = document.getElementById('vault-water-goal');
            if (wGoal) wGoal.value = app.settings.waterGoal;
            const pWork = document.getElementById('vault-pomo-work');
            if (pWork) pWork.value = app.settings.pomoWork;

            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;

            // Global UI Localization
            const ids = [
                'txt-gate-title', 'btn-gate-init', 'btn-gate-resume', 'txt-gate-status', 'txt-gate-secure',
                'txt-ob-header', 'txt-ob1-title', 'txt-ob3-title', 'txt-ob4-title',
                'theme-btn', 'lang-btn', 'lbl-mass', 'lbl-height', 'lbl-age',
                'modal-cancel-btn', 'modal-confirm-btn', 'btn-analyze', 'btn-finalize',
                'txt-splash-engine', 'btn-persona-std', 'btn-persona-ghost', 'txt-ob2-title', 'btn-ob2-pin', 'btn-ob2-bypass',
                'header-manifest', 'btn-water-reset-chip', 'txt-hdr-average', 'txt-vault-protocol', 'txt-vault-calibration',
                'txt-vault-data', 'btn-vault-export', 'btn-vault-import', 'btn-vault-nuke', 'btn-capture-gym', 'btn-remove-gym',
                'lbl-mass-ob', 'lbl-height-ob', 'lbl-age-ob', 'lbl-mass-v', 'lbl-height-v', 'lbl-age-v', 'lbl-bmi-v'
            ];

            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = t[id] || id.replace(/-/g, ' ').toUpperCase();
            });

            // Placeholders
            const phs = { 'setup-age-setup': 'ph-age', 'setup-w': 'ph-mass', 'setup-h': 'ph-height', 'vault-mass': 'ph-mass', 'vault-height': 'ph-height', 'vault-age': 'ph-age' };
            Object.keys(phs).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.placeholder = t[phs[id]] || '';
            });

            // Lang Buttons dynamic pop (Gateway & Settings)
            const gPt = document.getElementById('gate-lang-pt-btn');
            const gEn = document.getElementById('gate-lang-en-btn');
            const sPt = document.getElementById('sett-lang-pt-btn');
            const sEn = document.getElementById('sett-lang-en-btn');

            if (gPt && gEn) {
                if (app.lang === 'pt') { gPt.className = 'btn-lang active'; gEn.className = 'btn-lang'; }
                else { gEn.className = 'btn-lang active'; gPt.className = 'btn-lang'; }
            }
            if (sPt && sEn) {
                if (app.lang === 'pt') { sPt.className = 'btn'; sEn.className = 'btn btn-ghost'; }
                else { sEn.className = 'btn'; sPt.className = 'btn btn-ghost'; }
            }

            // View Title & Streak
            const vTitle = document.getElementById('view-title');
            if (vTitle) {
                const curViewKey = `view_${window.curV || 'warroom'}`;
                const baseTitle = t[curViewKey] || "S-SYNC";
                const streakHtml = (window.curV === 'warroom' && app.streak > 0) ? `<div style="font-size: 10px; font-weight: 1000; background: var(--accent); color: white; padding: 4px 10px; border-radius: 8px; margin-top: 5px; display: inline-block;">${t.streak || 'STREAK'}: ${app.streak} DAYS</div>` : '';
                vTitle.innerHTML = `${baseTitle} ${streakHtml}`;
            }

            // Task Containers
            const warContainer = document.getElementById('war-tasks-container');
            if (warContainer) {
                warContainer.innerHTML = '';
                const periods = ['morning', 'afternoon', 'night'];
                periods.forEach(per => {
                    const actInPer = app.pillars.filter(p => p.active && p.period === per && !p.done);
                    if (actInPer.length > 0) {
                        const hdr = document.createElement('div'); hdr.className = 'section-header';
                        hdr.innerText = t[per] || per;
                        warContainer.appendChild(hdr);
                        actInPer.forEach(p => warContainer.appendChild(createPillarCard(p)));
                    }
                });
            }

            const doneContainer = document.getElementById('done-tasks');
            if (doneContainer) {
                doneContainer.innerHTML = '';
                const donePillars = app.pillars.filter(p => p.active && p.done);
                donePillars.forEach(p => doneContainer.appendChild(createPillarCard(p)));
                const drawerTrig = document.getElementById('done-drawer-trigger');
                if (drawerTrig) drawerTrig.innerText = `${t.accomplished} (${donePillars.length})`;
            }

            // Stats & Rings
            const activeP = app.pillars.filter(p => p.active);
            const donePillars = app.pillars.filter(p => p.active && p.done);
            if (activeP.length > 0) {
                const pPC = Math.round((donePillars.length / activeP.length) * 100) || 0;
                const wPC = Math.min(100, Math.round((app.water.logged / app.water.target) * 100)) || 0;

                const perfRing = document.getElementById('perf-ring');
                const perfVal = document.getElementById('perf-val');
                const waterRing = document.getElementById('water-ring');
                const waterVal = document.getElementById('water-val');
                if (perfRing) perfRing.style.strokeDasharray = `${pPC}, 100`;
                if (perfVal) perfVal.innerText = pPC + '%';
                if (waterRing) waterRing.style.strokeDasharray = `${wPC}, 100`;
                if (waterVal) waterVal.innerText = wPC + '%';

                const rMiss = document.getElementById('txt-ring-mission');
                const rWat = document.getElementById('txt-ring-water');
                if (rMiss) rMiss.innerText = t.mission;
                if (rWat) rWat.innerText = t.water;

                const wReset = document.getElementById('btn-water-reset');
                if (wReset) wReset.innerText = t.water_reset;

