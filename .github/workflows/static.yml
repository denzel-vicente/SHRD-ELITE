        // --- AUTH & OTHER LOGIC ---
        // (Mostly same as previous versions but replacing native alerts with openModal/openPINModal)

        async function nuclearReset() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            openModal(t.warning, t.nuke_msg, () => {
                haptic([100, 50, 100, 50, 200]);
                const body = document.getElementById('modal-body');
                body.innerHTML = `<div style="text-align:center; padding:20px;">
                    <div style="font-size:10px; font-weight:900; letter-spacing:2px; color:var(--accent); margin-bottom:15px;">WIPING ENCRYPTED DATA</div>
                    <div style="height:2px; width:100%; background:var(--border); border-radius:10px; overflow:hidden;">
                        <div style="height:100%; width:0%; background:var(--accent); animation: wipeBar 1.5s forwards;"></div>
                    </div>
                </div>`;

                // Final Kill-Switch
                window.isResetting = true;
                document.getElementById('modal-actions').style.display = 'none';

                // Clear all persistent storage definitively
                localStorage.removeItem('SHRED_ELITE_PRO_VAULT');
                localStorage.clear();
                sessionStorage.clear();

                // Deep Cookie Wipe
                document.cookie.split(";").forEach(c => {
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });

                // Clear any potential caches
                if ('caches' in window) {
                    caches.keys().then(names => {
                        for (let name of names) caches.delete(name);
                    });
                }

                setTimeout(() => {
                    window.location.replace(window.location.pathname + window.location.search + (window.location.search ? '&' : '?') + 'reset=' + Date.now());
                }, 1800);
            });
        }

        // --- CORE HELPERS ---
        let obStep = 1; let drawerOpen = false;

        function haptic(ms = 25) { if (window.navigator.vibrate) window.navigator.vibrate(ms); }
        function save() {
            if (window.isResetting || !app.active) return; // Block save if resetting or not yet initialized
            app.ts = Date.now();
            localStorage.setItem('SHRED_ELITE_PRO_VAULT', JSON.stringify(app));
            render();
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
        }

        function unlock() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('app-shell').classList.add('active');
            checkMidnight(); render();
        }

        function checkMidnight() {
            const today = new Date().toLocaleDateString();
            if (app.lastDate !== today) {
                const act = app.pillars.filter(p => p.active);
                const pPC = Math.round((act.filter(p => p.done).length / act.length) * 100) || 0;
                const wPC = Math.min(100, Math.round((app.water.logged / app.water.target) * 100)) || 0;
                const dailyTotal = Math.round((pPC + wPC) / 2);

                app.history.unshift({ date: app.lastDate, total: dailyTotal, pPC, wPC });
                if (dailyTotal === 100) app.streak++; else app.streak = 0;

                app.pillars.forEach(p => p.done = false); app.water.logged = 0; app.lastDate = today; save();
            }
        }

        function toggleTheme() {
            app.theme = app.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', app.theme);
            document.body.setAttribute('data-theme', app.theme);
            save();
            render();
        }
        function toggleLang() { setLang(app.lang === 'en' ? 'pt' : 'en'); }

        function updateMetrics() {
            const m = document.getElementById('vault-mass');
            const h = document.getElementById('vault-height');
            const a = document.getElementById('vault-age');
            if (m && m.value) app.user.mass = parseFloat(m.value);
            if (h && h.value) app.user.height = parseFloat(h.value);
            if (a && a.value) app.user.age = parseInt(a.value);
            fetchWeather();
            save();
            haptic(20);
        }

        function triggerImport() { document.getElementById('import-input').click(); }
        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ex) => {
                try {
                    const data = JSON.parse(ex.target.result);
                    app = { ...app, ...data };
                    save();
                    location.reload();
                } catch (err) {
                    openModal("ERROR", "Invalid Vault File", () => { });
                }
            };
            reader.readAsText(file);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(app)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SHRED_VAULT_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        let timerInterval = null;
        function startTimer(sec) {
            haptic(50);
            let time = sec;
            const modal = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            const confirm = document.getElementById('modal-confirm');

            title.innerText = "TIMER ACTIVE";
            body.innerHTML = `<div style="font-size: 3rem; font-weight: 900; text-align: center; color: var(--accent);">${time}s</div>`;
            confirm.innerText = "ABORT";
            confirm.onclick = () => { clearInterval(timerInterval); closeModal(); };
            modal.classList.add('active');

            timerInterval = setInterval(() => {
                time--;
                body.innerHTML = `<div style="font-size: 3rem; font-weight: 900; text-align: center; color: var(--accent);">${time}s</div>`;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    haptic([100, 50, 100]);
                    body.innerHTML = `<div style="font-size: 1.5rem; font-weight: 900; text-align: center; color: var(--success);">PROTOCOL COMPLETE</div>`;
                    confirm.innerText = "DISMISS";
                }
            }, 1000);
        }

        // --- TRAINING LAB FOLDER ENGINE (Elite v10.0) ---
        function renderTrainingLab() {
            const dashboard = document.getElementById('training-dashboard');
            const activeView = document.getElementById('active-workout-view');

            if (app.training.activeWorkout) {
                if (dashboard) dashboard.style.display = 'none';
                if (activeView) activeView.style.display = 'block';
                renderActiveWorkout();
                return;
            } else {
                if (dashboard) dashboard.style.display = 'block';
                if (activeView) activeView.style.display = 'none';
            }

            const list = document.getElementById('mission-folders-list');
            const firePercentEl = document.getElementById('fire-percent');
            const weeklyStripEl = document.getElementById('weekly-strip');
            if (!list || !firePercentEl || !weeklyStripEl) return;

            list.innerHTML = '';
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;

            // --- FIRE % & WEEKLY STRIP LOGIC ---
            const now = new Date();
            let targetCount = 0;
            let actualCount = 0;
            let stripHTML = '';

            // Calculate for the last 7 days (including today)
            for (let i = 6; i >= 0; i--) {
                const checkDate = new Date(now);
                checkDate.setDate(now.getDate() - i);
                const dayIdx = checkDate.getDay();
                const dateStr = checkDate.toLocaleDateString();

                // Target: Is any folder assigned to this day?
                const isTargetDay = app.training.folders.some(f => f.days.includes(dayIdx));
                if (isTargetDay) targetCount++;

                // Actual: Was a workout finished on this day?
                const wasDone = app.training.history.some(h => h.date === dateStr);
                if (wasDone) actualCount++;

                const isActive = isTargetDay;
                const isCompleted = wasDone;
                stripHTML += `<div class="week-dot ${isActive ? 'active' : ''}" style="${isCompleted ? 'background:var(--success); box-shadow:0 0 8px var(--success);' : ''}"></div>`;
            }

            const consistency = targetCount > 0 ? Math.round((actualCount / targetCount) * 100) : 0;
            firePercentEl.innerText = `${consistency}%`;
            weeklyStripEl.innerHTML = stripHTML;

            if (!app.training.folders || app.training.folders.length === 0) {
                list.innerHTML = `<p style="text-align:center; opacity:0.3; font-size:10px; padding:20px;">${t['empty-folders']}</p>`;
            } else {
                app.training.folders.forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'folder-card';
                    card.style.cursor = 'pointer';

                    const today = new Date().getDay();
                    const isToday = f.days.includes(today);

                    let daysHTML = '';
                    for (let i = 0; i < 7; i++) {
                        const active = f.days.includes(i);
                        daysHTML += `<span style="font-size:7px; margin-right:4px; font-weight:900; color:${active ? 'var(--accent)' : 'var(--text-dim)'}; opacity:${active ? 1 : 0.3}">${t['day-' + i]}</span>`;
                    }

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <h3 style="font-size:14px; color:${isToday ? 'var(--accent)' : 'var(--text)'};">${f.name.toUpperCase()}</h3>
                                <div style="margin-top:6px;">${daysHTML}</div>
                            </div>
                            <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
                                <div style="font-size:8px; opacity:0.5; font-weight:900;">${f.exercises.length} EXERCISES</div>
                                <div style="color:var(--accent); font-size:14px; cursor:pointer;" onclick="event.stopPropagation(); deleteFolder('${f.id}')">🗑️</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn" style="flex:1; margin:0; padding:8px; font-size:10px; background:var(--bg); border:1px solid var(--border);" onclick="event.stopPropagation(); openFolderEditor('${f.id}')">MANAGE</button>
                            <button class="btn" style="flex:2; margin:0; padding:8px; font-size:10px; background:${isToday ? 'var(--accent-grad)' : 'var(--surface)'}; opacity:${isToday ? 1 : 0.6}" onclick="event.stopPropagation(); startFolderWorkout('${f.id}')">${t['btn-start-folder']}</button>
                        </div>
                    `;
                    card.onclick = () => openFolderEditor(f.id);
                    list.appendChild(card);
                });
            }



            // Render History
            const histList = document.getElementById('training-history-list');
            if (histList) {
                histList.innerHTML = '';
                if (app.training.history.length === 0) {
                    histList.innerHTML = '<p style="text-align:center; font-size:10px; opacity:0.3; padding:20px;">' + t['history_empty'] + '</p>';
                } else {
                    app.training.history.slice().reverse().forEach(h => {
                        const name = h.name || 'MISSION LOG';
                        const date = h.endTime ? new Date(h.endTime).toLocaleDateString() : (h.date || new Date().toLocaleDateString());
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.padding = '12px 15px';
                        card.innerHTML = `
                            <div style="flex:1;">
                                <h5 style="font-size:11px;">${name.toUpperCase()}</h5>
                                <small style="font-size:8px; opacity:0.5;">${date}</small>
                            </div>
                        `;
                        histList.appendChild(card);
                    });
                }
            }
        }

        function openFolderCreator() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            window.tempDays = [];
            const content = `
                <div style="text-align:left;">
                    <input id="f-name-in" placeholder="${t['ph-folder-name'] || 'FOLDER NAME'}" style="width:100%; font-size:16px; margin-bottom:20px;">
                    <p style="font-size:8px; font-weight:900; opacity:0.5; margin-bottom:8px;">${t['lbl-days'] || 'ASSIGNED DAYS'}</p>
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        ${[0, 1, 2, 3, 4, 5, 6].map(d => `<div class="day-chip" id="chip-${d}" onclick="toggleDayChip(${d})">${t['day-' + d] || d}</div>`).join('')}
                    </div>
                </div>
            `;
            openModal(t['btn-capture-folder'] || "ADD FOLDER", content, () => {
                const name = document.getElementById('f-name-in').value;
                if (!name) { haptic([50, 50]); return false; }
                const newFolder = {
                    id: 'f_' + Date.now(),
                    name: name,
                    days: window.tempDays,
                    exercises: []
                };
                app.training.folders.push(newFolder);
