                const targetSets = parseInt(ex.sets);

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-size:12px; font-weight:900;">${ex.name.toUpperCase()}</div>
                            <div style="font-size:8px; opacity:0.5; font-weight:900; letter-spacing:1px; margin-top:2px;">${(ex.machine || 'BODYWEIGHT').toUpperCase()}</div>
                        </div>
                        <div style="font-size:10px; font-weight:900; color:var(--accent);">${setsCount} / ${targetSets} SETS</div>
                    </div>
                    
                    <div style="display:flex; gap:10px; margin-top:12px;">
                        <input type="number" id="weight-${idx}" placeholder="KG" style="flex:1; font-size:12px; padding:10px;">
                        <input type="number" id="reps-${idx}" placeholder="REPS" style="flex:1; font-size:12px; padding:10px;">
