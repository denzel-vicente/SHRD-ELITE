                    ${alias ? `<p style="font-size:8px; opacity:0.5; margin-top:2px;">${alias}</p>` : ''}
                </div>
                <div class="checkbox ${p.done ? 'checked' : ''}" onclick="togglePillar('${p.id}')"></div>
            `;
