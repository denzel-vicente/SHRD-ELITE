        function openAddProtocolInternal() {
            const t = TRANSLATIONS[app.lang] || TRANSLATIONS.en;
            const content = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <input id="new-p-name" type="text" placeholder="${t['ph-protocol-name']}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                    <select id="new-p-phase" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                        <option value="morning">${t['opt-morning']}</option>
                        <option value="afternoon" selected>${t['opt-afternoon']}</option>
                        <option value="night">${t['opt-night']}</option>
                    </select>
                </div>
            `;
            openModal(t.mission, content, () => {
                const name = document.getElementById('new-p-name').value;
                const phase = document.getElementById('new-p-phase').value;
                if (!name) return;
                const id = 'custom_' + Date.now();
                const newP = {
                    id: id,
                    label_en: name, label_pt: name,
                    period: phase, active: true, done: false
                };
                app.pillars.push(newP);
                save();
                renderOnboardingChecklist(); // Real-time update for Step 4
                render();
            });
        }

        // --- PROJECTS & WORKSPACE ENGINE ---
        // --- PROJECTS & WORKSPACE ENGINE ---
        window.canvasZoom = 1;
        window.selectedBlockId = null;

        function adjustZoom(delta) {
            window.canvasZoom = Math.max(0.2, Math.min(2, window.canvasZoom + delta));
            const canvas = document.getElementById('project-canvas');
            if (canvas) canvas.style.transform = `scale(${window.canvasZoom})`;
            const zl = document.getElementById('zoom-level');
            if (zl) zl.innerText = Math.round(window.canvasZoom * 100) + '%';
        }

        function renderProjects() {
            const list = document.getElementById('folders-list');
            if (!list) return;
            list.innerHTML = '';
            const projs = app.projects || [];
            projs.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.marginBottom = '12px';
                card.style.padding = '18px';
                card.onclick = () => openFolder(p.id);
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h3 style="font-size:14px; font-weight:900; color:var(--text);">${p.name.toUpperCase()}</h3>
                            <p style="font-size:8px; opacity:0.5; font-weight:900; margin-top:4px;">${(p.blocks || []).length} ELEMENTS</p>
                        </div>
                        <div style="color:var(--text-dim); cursor:pointer; font-size:12px;" onclick="event.stopPropagation(); deleteProject('${p.id}')">🗑️</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function createNewFolder() {
            const content = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <input id="new-folder-name" type="text" placeholder="WORKSPACE NAME" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                </div>
            `;
            openModal("NEW WORKSPACE", content, () => {
                const name = document.getElementById('new-folder-name').value;
                if (name) {
                    const newProj = { id: 'p_' + Date.now(), name, blocks: [] };
                    if(!app.projects) app.projects = [];
                    app.projects.push(newProj);
                    save();
                    renderProjects();
                }
            });
        }

        function renameCurrentProject() {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            if (!proj) return;
            const content = `<input id="rename-val" type="text" value="${proj.name}" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px; width:100%;">`;
            openModal("RENAME WORKSPACE", content, () => {
                const newName = document.getElementById('rename-val').value;
                if (newName) {
                    proj.name = newName;
                    document.getElementById('current-folder-name').innerText = newName.toUpperCase();
                    save();
                }
            });
        }

        function deleteProject(id) {
            openModal("DELETE WORKSPACE", "Are you sure you want to irrevocably delete this workspace and all its blocks?", () => {
                app.projects = app.projects.filter(p => p.id !== id);
                save();
                renderProjects();
            });
        }

        function openFolder(id) {
            window.currentProjectId = id;
            window.canvasZoom = 1;
            window.selectedBlockId = null;
            navTo('project-canvas');
            setTimeout(() => adjustZoom(0), 50); // Reset UI
        }

        function deselectAll() {
            window.selectedBlockId = null;
            document.querySelectorAll('.project-block').forEach(b => b.classList.remove('selected'));
            const oldMenu = document.querySelector('.block-context-menu');
            if (oldMenu) oldMenu.remove();
        }

        function selectBlock(id, el) {
            deselectAll();
            window.selectedBlockId = id;
            el.classList.add('selected');
            
            const menu = document.createElement('div');
            menu.className = 'block-context-menu';
            menu.innerHTML = `
                <div class="context-btn" onclick="cycleBlockShade('${id}')" title="Style">🎨</div>
                <div class="context-btn" onclick="deleteBlock('${id}')" title="Delete">🗑️</div>
            `;
            el.appendChild(menu);
        }

        function renderProjectCanvas() {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            if (!proj) return;
            document.getElementById('current-folder-name').innerText = proj.name.toUpperCase();
            const canvas = document.getElementById('project-canvas');
            canvas.innerHTML = '';
            canvas.onclick = (e) => { if(e.target === canvas) deselectAll(); };

            (proj.blocks || []).forEach(b => {
                const el = document.createElement('div');
                el.id = b.id;
                el.className = `project-block block-shade-${b.shade || 'default'} ${window.selectedBlockId === b.id ? 'selected' : ''}`;
                el.style.left = b.x + 'px';
                el.style.top = b.y + 'px';
                if (b.w) el.style.width = b.w + 'px';
                if (b.h) el.style.height = b.h + 'px';
                
                let contentHtml = '';
                if (b.type === 'note') {
                    contentHtml = `<div class="block-text" contenteditable="true" onblur="updateBlockContent('${b.id}', this.innerText)">${b.content}</div>`;
                } else if (b.type === 'todo') {
                    contentHtml = `
                        <div class="block-todo">
                            <div class="checkbox ${b.done ? 'checked' : ''}" onclick="toggleBlockDone('${b.id}')"></div>
                            <div class="block-text" contenteditable="true" onblur="updateBlockContent('${b.id}', this.innerText)">${b.content}</div>
                        </div>
                    `;
                } else if (b.type === 'link') {
                    contentHtml = `
                        <div class="block-text" style="font-weight:900;">${b.title || 'Link'}</div>
                        <a href="${b.url}" target="_blank" class="block-link" style="color:inherit;">${b.url}</a>
                    `;
                } else if (b.type === 'image') {
                    contentHtml = `
                        <div class="block-image"><img src="${b.url}" onerror="this.src='https://via.placeholder.com/150?text=Invalid+Image'"></div>
                    `;
                } else if (b.type === 'section') {
                    el.style.zIndex = '1';
                    contentHtml = `<div class="block-text" contenteditable="true" style="font-weight:900; opacity:0.5;" onblur="updateBlockContent('${b.id}', this.innerText)">${b.content || 'SECTION'}</div>`;
                }

                el.innerHTML = `${contentHtml}<div class="resize-handle"></div>`;
                
                if (window.selectedBlockId === b.id) {
                    const menu = document.createElement('div');
                    menu.className = 'block-context-menu';
                    menu.innerHTML = `
                        <div class="context-btn" onclick="cycleBlockShade('${b.id}')">🎨</div>
                        <div class="context-btn" onclick="deleteBlock('${b.id}')">🗑️</div>
                    `;
                    el.appendChild(menu);
                }

                canvas.appendChild(el);
                makeDraggable(el, b);
                makeResizable(el, b);
            });
        }

        function cycleBlockShade(id) {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            const b = proj.blocks.find(x => x.id === id);
            const shades = ['light', 'medium', 'dark', 'transparent', 'default'];
            let idx = shades.indexOf(b.shade || 'default');
            b.shade = shades[(idx + 1) % shades.length];
            save();
            renderProjectCanvas();
        }

        function triggerImageUpload() {
            document.getElementById('block-image-input').click();
        }

        function handleBlockImageUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    addBlockToCanvas('image', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
                input.value = '';
            }
        }

        function addBlockToCanvas(type, manualUrl) {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            if (!proj) return;
            if (!proj.blocks) proj.blocks = [];
            
            let newBlock = { 
                id: 'b_' + Date.now(), 
                type, 
                x: 100 / window.canvasZoom, 
                y: 100 / window.canvasZoom, 
                done: false,
                shade: 'default'
            };

            const commit = (b) => { 
                proj.blocks.push(b); 
                window.selectedBlockId = b.id; 
                save(); 
                renderProjectCanvas(); 
            };

            if (type === 'note') {
                newBlock.content = 'New Note'; commit(newBlock);
            } else if (type === 'todo') {
                newBlock.content = 'New Task'; commit(newBlock);
            } else if (type === 'section') {
                newBlock.content = 'New Section'; newBlock.w = 300; newBlock.h = 200; newBlock.shade = 'transparent'; commit(newBlock);
            } else if (type === 'link') {
                const content = `
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <input id="l-url" type="text" placeholder="URL (https://...)" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                        <input id="l-title" type="text" placeholder="LINK TITLE" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; border-radius:12px;">
                    </div>
                `;
                openModal("ADD LINK", content, () => {
                    const url = document.getElementById('l-url').value;
                    const title = document.getElementById('l-title').value;
                    if (url) {
                        newBlock.url = url;
                        newBlock.title = title || 'Link';
                        commit(newBlock);
                    }
                });
            } else if (type === 'image') {
                newBlock.url = manualUrl; commit(newBlock);
            }
        }

        function deleteBlock(id) {
            openModal("DELETE BLOCK", "Remove this element from the workspace?", () => {
                const proj = app.projects.find(p => p.id === window.currentProjectId);
                proj.blocks = proj.blocks.filter(b => b.id !== id);
                window.selectedBlockId = null;
                save();
                renderProjectCanvas();
            });
        }

        function updateBlockContent(id, text) {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            const block = proj.blocks.find(b => b.id === id);
            if (block) { block.content = text; save(); }
        }

        function toggleBlockDone(id) {
            const proj = app.projects.find(p => p.id === window.currentProjectId);
            const block = proj.blocks.find(b => b.id === id);
            if (block) { block.done = !block.done; haptic(30); save(); renderProjectCanvas(); }
        }

        function makeResizable(el, blockData) {
            const handle = el.querySelector('.resize-handle');
            if (!handle) return;
            
            const startResize = (clientX, clientY) => {
                const startW = el.offsetWidth;
                const startH = el.offsetHeight;
                const startX = clientX;
                const startY = clientY;

                const move = (e) => {
                    const dx = ((e.clientX || (e.touches && e.touches[0].clientX)) - startX) / window.canvasZoom;
                    const dy = ((e.clientY || (e.touches && e.touches[0].clientY)) - startY) / window.canvasZoom;
                    el.style.width = (startW + dx) + 'px';
                    el.style.height = (startH + dy) + 'px';
                };

                const end = () => {
                    blockData.w = el.offsetWidth;
                    blockData.h = el.offsetHeight;
                    save();
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', end);
                    document.removeEventListener('touchmove', move);
                    document.removeEventListener('touchend', end);
                };

                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', end);
                document.addEventListener('touchmove', move, { passive: false });
                document.addEventListener('touchend', end);
            };

            handle.addEventListener('mousedown', (e) => { e.stopPropagation(); e.preventDefault(); startResize(e.clientX, e.clientY); });
            handle.addEventListener('touchstart', (e) => { e.stopPropagation(); startResize(e.touches[0].clientX, e.touches[0].clientY); });
        }

        function makeDraggable(el, blockData) {
            let offset = [0, 0];
            const startDrag = (clientX, clientY) => {
                offset = [el.offsetLeft - clientX / window.canvasZoom, el.offsetTop - clientY / window.canvasZoom];
                const move = (e) => {
                    const x = (e.clientX || (e.touches && e.touches[0].clientX)) / window.canvasZoom + offset[0];
                    const y = (e.clientY || (e.touches && e.touches[0].clientY)) / window.canvasZoom + offset[1];
                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                };
                const end = () => {
                    blockData.x = parseInt(el.style.left);
                    blockData.y = parseInt(el.style.top);
                    save();
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', end);
                    document.removeEventListener('touchmove', move);
                    document.removeEventListener('touchend', end);
                };
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', end);
                document.addEventListener('touchmove', move, { passive: false });
                document.addEventListener('touchend', end);
            };

            el.addEventListener('mousedown', (e) => { 
                if(e.target.contentEditable === 'true' || e.target.closest('.block-context-menu') || e.target.closest('.resize-handle')) return;
                e.preventDefault(); 
                selectBlock(blockData.id, el);
                startDrag(e.clientX, e.clientY); 
            });
            el.addEventListener('touchstart', (e) => { 
                if(e.target.contentEditable === 'true' || e.target.closest('.block-context-menu') || e.target.closest('.resize-handle')) return;
                selectBlock(blockData.id, el);
                startDrag(e.touches[0].clientX, e.touches[0].clientY); 
            });
        }

        initApp();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW Registration Failed', err));
        });
    }
    </script>
</body>

</html>
